version: "3.8"

# ============================================
# CookMate - Docker Compose
# ============================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cookmate-app
    ports:
      - "3000:3001"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: cookmate-postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cookmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cookmate}
      POSTGRES_DB: ${POSTGRES_DB:-cookmate}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cookmate} -d ${POSTGRES_DB:-cookmate}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

# ==========================================
# Volumes
# ==========================================
volumes:
  pgdata:
    driver: local
